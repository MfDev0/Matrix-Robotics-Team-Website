    <style>
        .form-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .cad-form-panel {
            background: var(--bg-panel);
            border: 1px solid var(--dark-green);
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
        }

        .cad-form-panel::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--matrix-green), transparent);
            animation: scanline 3s linear infinite;
        }

        @keyframes scanline {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .form-title {
            font-family: var(--font-mono);
            color: var(--matrix-green);
            font-size: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--dark-green);
            padding-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--mid-green);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-control {
            background: rgba(0, 20, 0, 0.4);
            border: 1px solid var(--dark-green);
            color: var(--matrix-green);
            padding: 0.8rem 1rem;
            font-family: var(--font-mono);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--matrix-green);
            background: rgba(0, 40, 0, 0.6);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }

        textarea.form-control {
            min-height: 120px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--matrix-green);
            color: var(--matrix-green);
            padding: 1rem;
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background: var(--matrix-green);
            color: var(--bg-black);
            box-shadow: var(--glow);
        }

        .page-header {
            text-align: center;
            margin: 4rem 0 2rem;
        }

        .page-title {
            font-size: 3rem;
            font-weight: 900;
            color: var(--matrix-green);
            text-shadow: var(--glow-strong);
            letter-spacing: 5px;
            margin-bottom: 1rem;
        }
    </style>
</head>

        <div class="form-content">
            <section class="cad-form-panel" data-aos="fade-up">
                <h2 class="form-title">
                    <i class="fas fa-cube"></i>
                    <span data-en="SECURE_REQUEST_V1" data-ar="طلب_آمن_V1">SECURE_REQUEST_V1</span>
                </h2>

                <form id="cadRequestForm" method="POST">
                    <!-- Hidden Config -->
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_subject" value="New CAD Request - V1">
                    <input type="hidden" name="_next" value="index.html">

                    <div class="form-group">
                        <label data-en="Full Name" data-ar="الاسم الكامل">Full Name</label>
                        <input type="text" name="name" class="form-control" placeholder="NEO" required>
                    </div>

                    <div class="form-group">
                        <label data-en="Team Name" data-ar="اسم الفريق">Team Name</label>
                        <input type="text" name="team_name" class="form-control" placeholder="MATRIX ROBOTICS" required>
                    </div>

                    <div class="form-group">
                        <label data-en="Team Code" data-ar="رمز الفريق">Team Code</label>
                        <input type="text" name="team_code" class="form-control" placeholder="FTC-12345" required>
                    </div>

                    <div class="form-group">
                        <label data-en="Email Address" data-ar="البريد الإلكتروني">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="operative@matrix.com"
                            required>
                    </div>

                    <div class="form-group">
                        <label data-en="Reason for Request" data-ar="سبب الطلب">Reason for Request</label>
                        <textarea name="message" class="form-control" placeholder="Infiltrating the system..."
                            required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">
                        <i class="fas fa-paper-plane"></i>
                        <span data-en="INITIALIZE REQUEST" data-ar="بدء الطلب">INITIALIZE REQUEST</span>
                    </button>
                </form>
            </section>
